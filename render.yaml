services:
  - type: web
    name: bom-tool
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MOUSER_API_KEY
        sync: false
      - key: DIGIKEY_CLIENT_ID
        sync: false
      - key: DIGIKEY_CLIENT_SECRET
        sync: false
